{% extends "base.html" %}
{% block title %}Registrar Ocorrência de Praga{% endblock %}
{% block content %}
<div class="grid" style="max-width:700px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:1.5rem;">
        <h2 style="margin:0;">🐛 Registrar Ocorrência de Praga/Doença</h2>
        <a href="{{ url_for('pulverizacao.listar_ocorrencias') }}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card">
        <form method="POST" class="form" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-col-6">
                    <label>Lavoura Afetada *</label>
                    <select name="lavoura_id" required>
                        <option value="">Selecione a lavoura...</option>
                        {% for l in lavouras %}
                        <option value="{{ l.id }}">{{ l.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-col-6">
                    <label>Praga / Doença *</label>
                    <select name="praga_id" required>
                        <option value="">Selecione o alvo...</option>
                        {% for p in pragas %}
                        <option value="{{ p.id }}">{{ p.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-4">
                    <label>Severidade *</label>
                    <select name="severidade" required>
                        <option value="baixa">🍃 Baixa</option>
                        <option value="media">⚠️ Média</option>
                        <option value="alta">🚨 Alta</option>
                        <option value="critica">🔥 Crítica</option>
                    </select>
                </div>
                <div class="form-col-4">
                    <label>% Infestação (Est.)</label>
                    <input type="number" step="0.1" name="percentual_infestacao" placeholder="Ex: 5.5">
                </div>
                <div class="form-col-4">
                    <label>Data da Detecção *</label>
                    <input type="date" name="data_deteccao" value="{{ now.strftime('%Y-%m-%d') }}" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-12">
                    <label>Foto do Sintoma/Praga</label>
                    <input type="file" name="foto" accept="image/*" style="border:none;padding:5px 0;">
                    <small style="color:#888;">Formatos permitidos: JPG, PNG, GIF. Máx 5MB.</small>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-12">
                    <label>Observações Detalhadas</label>
                    <textarea name="observacoes" rows="4" placeholder="Descreva o que visualizou (ex: manchas amareladas, bordos secos, presença de larvas...)"></textarea>
                </div>
            </div>

            <div class="flex-between" style="margin-top:2rem;padding-top:1rem;border-top:1px solid #eee;">
                <a href="{{ url_for('pulverizacao.listar_ocorrencias') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">💾 Registrar Ocorrência</button>
            </div>
        </form>
    </div>
</div>

<style>
.form-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
.form-col-4 { flex: 0 0 calc(33.3% - 10px); min-width: 150px; }
.form-col-6 { flex: 0 0 calc(50% - 8px); min-width: 250px; }
.form-col-12 { flex: 100%; }
label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; color: #555; }
input:not([type="file"]), select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; box-sizing: border-box; }
</style>
{% endblock %}
