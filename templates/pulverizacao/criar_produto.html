{% extends "base.html" %}
{% block title %}Novo Produto de Pulverização{% endblock %}
{% block content %}
<div class="grid" style="max-width:760px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:1.5rem;">
        <h2 style="margin:0;">🧪 Novo Produto de Pulverização</h2>
        <a href="{{ url_for('pulverizacao.listar_produtos_pulverizacao') }}" class="btn btn-secondary">← Voltar</a>
    </div>
    <div class="card">
        <form method="POST" class="form">
            <div class="fr"><div class="fc8"><label>Nome do Produto *</label><input type="text" name="nome" required></div>
            <div class="fc4"><label>Tipo *</label><select name="tipo" required><option value="">Selecione...</option>{% for t in tipos %}<option value="{{ t }}">{{ t|capitalize }}</option>{% endfor %}</select></div></div>
            <div class="fr"><div class="fc6"><label>Ingrediente Ativo</label><input type="text" name="ingrediente_ativo"></div>
            <div class="fc6"><label>Concentração</label><input type="text" name="concentracao" placeholder="Ex: 500 g/L"></div></div>
            <div class="fr"><div class="fc4"><label>Dose Recomendada</label><input type="text" name="dose_recomendada" placeholder="Ex: 200"></div>
            <div class="fc4"><label>Unidade da Dose</label><select name="unidade_dose"><option value="ml">ml/ha</option><option value="L">L/ha</option><option value="g">g/ha</option><option value="kg">kg/ha</option></select></div>
            <div class="fc4"><label>Período de Carência (dias)</label><input type="number" min="0" name="periodo_carencia" value="0"></div></div>
            <div class="fr"><div class="fc6"><label>Fabricante</label><input type="text" name="fabricante"></div>
            <div class="fc6"><label>Registro MAPA</label><input type="text" name="registro_mapa"></div></div>
            <div class="fr"><div class="fc12"><label>Descrição / Observações</label><textarea name="descricao" rows="3"></textarea></div></div>
            <div class="flex-between" style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border,#e5e7eb);">
                <a href="{{ url_for('pulverizacao.listar_produtos_pulverizacao') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">💾 Salvar Produto</button>
            </div>
        </form>
    </div>
</div>
<style>.fr{display:flex;gap:15px;margin-bottom:15px;flex-wrap:wrap;}.fc4{flex:0 0 calc(33.33% - 10px);min-width:140px;}.fc6{flex:0 0 calc(50% - 8px);min-width:180px;}.fc8{flex:0 0 calc(66.66% - 5px);min-width:220px;}.fc12{flex:1;}label{display:block;margin-bottom:5px;font-weight:500;font-size:.9rem;}input,select,textarea{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;}</style>
{% endblock %}
