{% extends "base.html" %}
{% block title %}Nova Produção{% endblock %}
{% block content %}
<div style="background: white; padding: 2rem; border-radius: 8px;">
    <h1>Nova Produção</h1>
    <form method="post">
        <div class="form-group">
            <label for="lavoura_id">Lavoura:</label>
            <select name="lavoura_id" id="lavoura_id" required>
                {% for lavoura in lavouras %}
                <option value="{{ lavoura.id }}">{{ lavoura.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="data_colheita">Data da Colheita:</label>
            <input type="date" name="data_colheita" id="data_colheita" required>
        </div>
        <div class="form-group">
            <label for="quantidade_kg">Quantidade (kg):</label>
            <input type="number" step="0.01" name="quantidade_kg" id="quantidade_kg" required>
        </div>
        <div class="form-group">
            <label for="qualidade">Qualidade (ex: Boa, Regular, Ruim):</label>
            <input type="text" name="qualidade" id="qualidade">
        </div>
        <div class="form-group">
            <label for="observacoes">Observações:</label>
            <textarea name="observacoes" id="observacoes" style="width: 100%; padding: 0.5rem;"></textarea>
        </div>
        <button type="submit" style="padding: 0.5rem 1rem; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer;">Salvar Registro</button>
    </form>
</div>
{% endblock %}
