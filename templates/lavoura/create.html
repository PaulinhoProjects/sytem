{% extends "base.html" %}
{% block title %}Criar Lavoura{% endblock %}
{% block content %}
<div style="background: white; padding: 2rem; border-radius: 8px;">
    <h1>Criar Lavoura</h1>
    <form method="post">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        <div class="form-group">
            <label for="descricao">Descrição:</label>
            <textarea id="descricao" name="descricao" style="width: 100%; padding: 0.5rem;"></textarea>
        </div>
        <div class="form-group">
            <label for="area">Área (ha):</label>
            <input type="number" step="0.01" id="area" name="area" required>
        </div>
        {% if current_user.role == 'ADM' %}
            <div class="form-group">
                <label for="produtor_id">Produtor:</label>
                <select id="produtor_id" name="produtor_id" required>
                    {% for p in produtores %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
        {% endif %}
        <button type="submit" style="padding: 0.5rem 1rem; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer;">Criar</button>
    </form>
</div>
{% endblock %}
