{% extends "base.html" %}
{% block title %}Editar Lavoura{% endblock %}
{% block content %}
<div style="background: white; padding: 2rem; border-radius: 8px;">
    <h1>Editar Lavoura</h1>
    <form method="post">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" value="{{ lavoura.nome }}" required>
        </div>
        <div class="form-group">
            <label for="descricao">Descrição:</label>
            <textarea id="descricao" name="descricao" style="width: 100%; padding: 0.5rem;">{{ lavoura.descricao }}</textarea>
        </div>
        <div class="form-group">
            <label for="area">Área (ha):</label>
            <input type="number" step="0.01" id="area" name="area" value="{{ lavoura.area }}" required>
        </div>
        <button type="submit" style="padding: 0.5rem 1rem; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer;">Salvar</button>
    </form>
</div>
{% endblock %}
