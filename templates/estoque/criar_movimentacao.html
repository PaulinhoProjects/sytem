{% extends "base.html" %}
{% block title %}Nova Movimentação — Estoque{% endblock %}
{% block content %}
<div class="grid" style="max-width:700px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:1.5rem;">
        <h2 style="margin:0;">⇄ Registrar Movimentação</h2>
        <a href="{{ url_for('estoque.listar_movimentacoes') }}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card">
        <form method="POST" class="form" id="form-movimentacao">
            <div class="form-row">
                <div class="form-col-12">
                    <label>Produto <span style="color:#dc2626;">*</span></label>
                    <select name="produto_id" id="select-produto" required onchange="buscarSaldo(this.value)">
                        <option value="">Selecione o produto...</option>
                        {% for p in produtos %}
                        <option value="{{ p.id }}" {% if request.args.get('produto_id')|int == p.id %}selected{% endif %}>
                            {{ p.nome }} ({{ p.codigo_interno }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Saldo dinâmico -->
            <div id="saldo-info" style="display:none;padding:10px 14px;border-radius:8px;background:#f0fdf4;border:1px solid #bbf7d0;margin-bottom:16px;font-size:.9rem;">
                Saldo atual: <strong id="saldo-valor">—</strong>
            </div>

            {% if produtores|length > 1 %}
            <div class="form-row">
                <div class="form-col-12">
                    <label>Produtor <span style="color:#dc2626;">*</span></label>
                    <select name="produtor_id" required>
                        <option value="">Selecione o produtor...</option>
                        {% for prod in produtores %}
                        <option value="{{ prod.id }}">{{ prod.name }} — {{ prod.farm_name or '' }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            {% else %}
            <input type="hidden" name="produtor_id" value="{{ produtores[0].id }}">
            {% endif %}

            <div class="form-row">
                <div class="form-col-6">
                    <label>Tipo de Movimentação <span style="color:#dc2626;">*</span></label>
                    <select name="tipo" required>
                        {% for tipo in tipos_movimentacao %}
                        <option value="{{ tipo }}">
                            {% if tipo == 'entrada' %}📥 Entrada
                            {% elif tipo == 'saida' %}📤 Saída
                            {% elif tipo == 'devolucao' %}↩️ Devolução
                            {% elif tipo == 'ajuste' %}⚙️ Ajuste de Inventário
                            {% else %}{{ tipo|capitalize }}{% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-col-6">
                    <label>Quantidade <span style="color:#dc2626;">*</span></label>
                    <input type="number" step="0.01" min="0.01" name="quantidade" required placeholder="0.00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-6">
                    <label>Número da Nota Fiscal</label>
                    <input type="text" name="numero_nf" placeholder="Opcional">
                </div>
                <div class="form-col-6">
                    <label>Data da Movimentação</label>
                    <input type="datetime-local" name="data_movimentacao" value="{{ now }}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-12">
                    <label>Observação / Motivo</label>
                    <textarea name="observacao" rows="3" placeholder="Descreva o motivo da movimentação..."></textarea>
                </div>
            </div>

            <div class="flex-between" style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border,#e5e7eb);">
                <a href="{{ url_for('estoque.listar_movimentacoes') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">✅ Registrar Movimentação</button>
            </div>
        </form>
    </div>
</div>

<script>
function buscarSaldo(produtoId) {
    const infoDiv = document.getElementById('saldo-info');
    const saldoValor = document.getElementById('saldo-valor');
    
    if (!produtoId) {
        infoDiv.style.display = 'none';
        return;
    }
    
    fetch(`/estoque/api/saldo/${produtoId}`)
        .then(r => r.json())
        .then(data => {
            if (data.quantidade_atual !== undefined) {
                saldoValor.textContent = data.quantidade_atual.toFixed(2) + ' (disponível: ' + data.quantidade_disponivel.toFixed(2) + ')';
                infoDiv.style.display = 'block';
            }
        })
        .catch(() => { infoDiv.style.display = 'none'; });
}

// Auto-select se produto_id vem via query string
window.onload = function() {
    const select = document.getElementById('select-produto');
    if (select.value) buscarSaldo(select.value);
};
</script>

<style>
.form-row{display:flex;gap:15px;margin-bottom:16px;flex-wrap:wrap;}
.form-col-6{flex:0 0 calc(50% - 8px);min-width:200px;}
.form-col-12{flex:1;}
label{display:block;margin-bottom:5px;font-weight:500;font-size:.9rem;}
input,select,textarea{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;}
.flex{display:flex;align-items:center;}
</style>
{% endblock %}
