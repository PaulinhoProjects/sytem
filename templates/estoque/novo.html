{% extends "base.html" %}
{% block content %}
<div class="grid" style="max-width: 800px; margin: 0 auto;">
    <h2>📦 Novo Produto no Estoque</h2>
    
    <div class="card">
        <form method="POST" class="form">
            <div class="row">
                <div class="col-8">
                    <label>Nome do Produto*</label>
                    <input type="text" name="nome" required placeholder="Ex: Fertilizante NPK 04-14-08">
                </div>
                <div class="col-4">
                    <label>Código Interno*</label>
                    <input type="text" name="codigo_interno" required placeholder="COD001">
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <label>Categoria*</label>
                    <select name="categoria_id" required>
                        <option value="">Selecione...</option>
                        {% for c in categorias %}
                            <option value="{{ c.id }}">{{ c.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-6">
                    <label>Unidade de Medida*</label>
                    <select name="unidade_medida_id" required>
                        <option value="">Selecione...</option>
                        {% for u in unidades %}
                            <option value="{{ u.id }}">{{ u.nome }} ({{ u.sigla }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-4">
                    <label>Qtd Mínima</label>
                    <input type="number" step="0.01" name="quantidade_minima" value="0">
                </div>
                <div class="col-4">
                    <label>Qtd Máxima</label>
                    <input type="number" step="0.01" name="quantidade_maxima" value="0">
                </div>
                <div class="col-4">
                    <label>Preço Unitário (R$)</label>
                    <input type="number" step="0.01" name="preco_unitario" value="0">
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <label>Fornecedor Preferencial</label>
                    <input type="text" name="fornecedor" placeholder="Ex: Cooperativa Agropecuária">
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <label>Descrição / Observações</label>
                    <textarea name="descricao" rows="3"></textarea>
                </div>
            </div>

            <div class="flex-between" style="margin-top: 20px;">
                <a href="{{ url_for('estoque.listar') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Salvar Produto</button>
            </div>
        </form>
    </div>
</div>

<style>
    .row { display: flex; gap: 15px; margin-bottom: 15px; }
    .col-4 { flex: 0 0 calc(33.33% - 10px); }
    .col-6 { flex: 0 0 calc(50% - 7.5px); }
    .col-8 { flex: 0 0 calc(66.66% - 5px); }
    .col-12 { flex: 1; }
    label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); }
</style>
{% endblock %}
