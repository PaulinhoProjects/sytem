{% extends "base.html" %}
{% block title %}Criar Produto — Estoque{% endblock %}
{% block content %}
<div class="grid" style="max-width:860px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:1.5rem;">
        <h2 style="margin:0;">📦 Novo Produto</h2>
        <a href="{{ url_for('estoque.listar_produtos') }}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card">
        <form method="POST" class="form">
            <div class="form-row">
                <div class="form-col-8">
                    <label>Nome do Produto <span style="color:#dc2626;">*</span></label>
                    <input type="text" name="nome" required placeholder="Ex: Fertilizante NPK 04-14-08">
                </div>
                <div class="form-col-4">
                    <label>Código Interno <span style="color:#dc2626;">*</span></label>
                    <input type="text" name="codigo_interno" required placeholder="EX: FERT001">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-6">
                    <label>Categoria <span style="color:#dc2626;">*</span></label>
                    <select name="categoria_id" required>
                        <option value="">Selecione...</option>
                        {% for c in categorias %}
                        <option value="{{ c.id }}">{{ c.nome }}</option>
                        {% endfor %}
                    </select>
                    {% if not categorias %}
                    <small style="color:#d97706;">⚠ Nenhuma categoria. <a href="{{ url_for('estoque.criar_categoria') }}">Criar agora</a></small>
                    {% endif %}
                </div>
                <div class="form-col-6">
                    <label>Unidade de Medida <span style="color:#dc2626;">*</span></label>
                    <select name="unidade_id" required>
                        <option value="">Selecione...</option>
                        {% for u in unidades %}
                        <option value="{{ u.id }}">{{ u.nome }} ({{ u.sigla }})</option>
                        {% endfor %}
                    </select>
                    {% if not unidades %}
                    <small style="color:#d97706;">⚠ Nenhuma unidade. <a href="{{ url_for('estoque.criar_unidade') }}">Criar agora</a></small>
                    {% endif %}
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-4">
                    <label>Quantidade Mínima</label>
                    <input type="number" step="0.01" min="0" name="quantidade_minima" value="0">
                </div>
                <div class="form-col-4">
                    <label>Quantidade Máxima</label>
                    <input type="number" step="0.01" min="0" name="quantidade_maxima" value="0">
                </div>
                <div class="form-col-4">
                    <label>Preço Unitário (R$)</label>
                    <input type="number" step="0.01" min="0" name="preco_unitario" value="0.00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-12">
                    <label>Fornecedor Preferencial</label>
                    <input type="text" name="fornecedor" placeholder="Ex: AgroSul Distribuidora Ltda.">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col-12">
                    <label>Descrição / Observações</label>
                    <textarea name="descricao" rows="3" placeholder="Informações adicionais sobre o produto..."></textarea>
                </div>
            </div>

            <div class="flex-between" style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border,#e5e7eb);">
                <a href="{{ url_for('estoque.listar_produtos') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">💾 Salvar Produto</button>
            </div>
        </form>
    </div>
</div>
<style>
.form-row{display:flex;gap:15px;margin-bottom:16px;flex-wrap:wrap;}
.form-col-4{flex:0 0 calc(33.33% - 10px);min-width:160px;}
.form-col-6{flex:0 0 calc(50% - 8px);min-width:200px;}
.form-col-8{flex:0 0 calc(66.66% - 5px);min-width:250px;}
.form-col-12{flex:1;}
label{display:block;margin-bottom:5px;font-weight:500;font-size:.9rem;}
input,select,textarea{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;}
</style>
{% endblock %}
