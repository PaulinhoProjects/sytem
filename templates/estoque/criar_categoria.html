{% extends "base.html" %}
{% block title %}Nova Categoria — Estoque{% endblock %}
{% block content %}
<div class="grid" style="max-width:560px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:1.5rem;">
        <h2 style="margin:0;">🏷️ Nova Categoria de Estoque</h2>
        <a href="{{ url_for('estoque.listar_categorias') }}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card">
        <form method="POST" class="form">
            <div style="margin-bottom:16px;">
                <label style="display:block;margin-bottom:5px;font-weight:500;">Nome da Categoria <span style="color:#dc2626;">*</span></label>
                <input type="text" name="nome" required placeholder="Ex: Fertilizantes, Defensivos, Ferramentas..."
                       style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;margin-bottom:5px;font-weight:500;">Descrição</label>
                <textarea name="descricao" rows="3" placeholder="Descreva brevemente o tipo de produtos desta categoria..."
                          style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;resize:vertical;"></textarea>
            </div>
            <div class="flex-between" style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border,#e5e7eb);">
                <a href="{{ url_for('estoque.listar_categorias') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">💾 Criar Categoria</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
