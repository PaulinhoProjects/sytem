{% extends "base.html" %}
{% block title %}Nova Unidade de Medida — Estoque{% endblock %}
{% block content %}
<div class="grid" style="max-width:560px;margin:0 auto;">
    <div class="flex-between" style="margin-bottom:1.5rem;">
        <h2 style="margin:0;">📏 Nova Unidade de Medida</h2>
        <a href="{{ url_for('estoque.listar_unidades') }}" class="btn btn-secondary">← Voltar</a>
    </div>

    <div class="card">
        <form method="POST" class="form">
            <div style="margin-bottom:16px;">
                <label style="display:block;margin-bottom:5px;font-weight:500;">Nome <span style="color:#dc2626;">*</span></label>
                <input type="text" name="nome" required placeholder="Ex: Quilograma, Litro, Unidade..."
                       style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;margin-bottom:5px;font-weight:500;">Sigla <span style="color:#dc2626;">*</span></label>
                <input type="text" name="sigla" required placeholder="Ex: kg, L, un, sc, cx..."
                       maxlength="10"
                       style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;text-transform:uppercase;">
                <small style="color:#888;font-size:.8rem;">Máx. 10 caracteres. Será salvo em maiúsculas.</small>
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block;margin-bottom:5px;font-weight:500;">Descrição</label>
                <textarea name="descricao" rows="2" placeholder="Descrição opcional..."
                          style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border,#d1d5db);background:var(--bg-card,#fff);color:var(--text,#111);box-sizing:border-box;resize:vertical;"></textarea>
            </div>
            <div class="flex-between" style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border,#e5e7eb);">
                <a href="{{ url_for('estoque.listar_unidades') }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">💾 Criar Unidade</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
